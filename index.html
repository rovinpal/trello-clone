<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Trello Clone</title>
    <link rel="stylesheet" href="./css/style.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>

<body>

    <header class="navbar">
        <h1>Trello Clone</h1>
    </header>

    <main>
        <section id="board" class="board">
        </section>
    </main>

    <div id="modal-overlay" class="modal-overlay hidden">
        <div class="modal">

            <h2 id="modal-title">Create Item</h2>

            <input type="text" id="modal-input" placeholder="Enter name...">

            <div class="modal-actions">
                <button id="modal-cancel-btn">
                    Cancel
                </button>

                <button id="modal-save-btn">
                    Save
                </button>
            </div>

        </div>
    </div>

    <div id="card-details-overlay" class="modal-overlay hidden">

        <div class="modal">

            <h2 id="card-details-title">
                Card Details
            </h2>

            <div id="card-details-content">

            </div>

            <div class="modal-actions">
                <button id="add-checklist-btn">
                    + Add Checklist
                </button>
                <button id="close-card-details-btn">
                    Cancel
                </button>
            </div>

        </div>

    </div>

    <script src="js/config.js"></script>
    <!-- <script src="js/api.js"></script> -->
    <script src="js/board.js"></script>
    <script src="js/list.js"></script>
    <script src="js/card.js"></script>
    <script src="js/checklist.js"></script>
    <script src="js/checkitem.js"></script>
    <script src="js/main.js"></script>

</body>

</html>
